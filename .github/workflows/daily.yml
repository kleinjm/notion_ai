name: Copy Today rows

on:
  schedule:
    # GitHub Actions cron is always UTC and does not observe DST, so we fire at
    # both offsets to hit 2am Pacific year-round:
    #   09:00 UTC = 2am PDT (summer),  10:00 UTC = 2am PST (winter).
    # Both fire, but the off-season one is a harmless no-op: the first run
    # flips every Today=true row back to false, so the second finds nothing.
    # The script stamps the prior day's date, so a 2am run logs the day before.
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:      # allows manual runs from the Actions tab
    inputs:
      test_page_id:
        description: "Process only this single source page id (leave blank for all Today=true rows)"
        required: false
        default: ""
      dry_run:
        description: "Read-only: print what would happen without writing"
        type: boolean
        default: false

jobs:
  copy-today:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python copy_today.py
        env:
          NOTION_PAT: ${{ secrets.NOTION_PAT }}
          SOURCE_DB_ID: ${{ vars.SOURCE_DB_ID }}
          TARGET_DB_ID: ${{ vars.TARGET_DB_ID }}
          TODAY_PROP: ${{ vars.TODAY_PROP }}
          TARGET_DATE_PROP: ${{ vars.TARGET_DATE_PROP }}
          TIMEZONE: "America/Los_Angeles"
          # Scheduled runs pass no inputs, so these default to empty/false and
          # the script processes all Today=true rows.
          TEST_PAGE_ID: ${{ inputs.test_page_id }}
          DRY_RUN: ${{ inputs.dry_run }}
