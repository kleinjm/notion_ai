name: Copy Today rows

on:
  schedule:
    # GitHub Actions cron is always UTC and does not observe DST, so we fire at
    # both offsets and let RUN_ONLY_AT_HOUR (below) no-op the wrong one:
    #   05:00 UTC = 10pm PDT (summer),  06:00 UTC = 10pm PST (winter).
    # Result: exactly one run at 10pm Pacific year-round.
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:      # allows manual runs from the Actions tab
    inputs:
      test_page_id:
        description: "Process only this single source page id (leave blank for all Today=true rows)"
        required: false
        default: ""
      dry_run:
        description: "Read-only: print what would happen without writing"
        type: boolean
        default: false

jobs:
  copy-today:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python copy_today.py
        env:
          NOTION_PAT: ${{ secrets.NOTION_PAT }}
          SOURCE_DB_ID: ${{ vars.SOURCE_DB_ID }}
          TARGET_DB_ID: ${{ vars.TARGET_DB_ID }}
          TODAY_PROP: ${{ vars.TODAY_PROP }}
          TARGET_DATE_PROP: ${{ vars.TARGET_DATE_PROP }}
          TIMEZONE: "America/Los_Angeles"
          # Only enforced on scheduled runs, so the off-by-one-hour cron
          # no-ops. Manual dispatch leaves it blank and always runs.
          RUN_ONLY_AT_HOUR: ${{ github.event_name == 'schedule' && '22' || '' }}
          # Scheduled runs pass no inputs, so these default to empty/false and
          # the script processes all Today=true rows.
          TEST_PAGE_ID: ${{ inputs.test_page_id }}
          DRY_RUN: ${{ inputs.dry_run }}
